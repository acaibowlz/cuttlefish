{% extends "base.html" %}

{% block title %}{{ page.title }} — {{ site.title }}{% endblock %}

{% block content %}
  <article class="project">
    <h1>{{ page.title }}</h1>
    {% if page.meta.url %}<p><a href="{{ page.meta.url }}">{{ page.meta.url }}</a></p>{% endif %}
    <div class="body">{{ page.body_html | safe }}</div>
  </article>
{% endblock %}
