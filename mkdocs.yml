site_name: cuttlefish
site_description: Agentic static site generator — agent-driven sites from config, templates, and Markdown
docs_dir: docs
repo_url: https://github.com/acaibowlz/cuttlefish
repo_name: acaibowlz/cuttlefish

theme:
  name: material
  palette:
    - scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.follow

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Working with an agent: working-with-an-agent.md
  - Configuration: configuration.md
  - Authoring content: content.md
  - Templates & theming: templates.md
  - CLI reference: cli.md
  - Deployment: deployment.md
  - Incremental builds: incremental-builds.md
  - Recipes: recipes.md

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
