[project]
name = "ass"
version = "0.1.0"
description = "Agentic static site generator — agent-driven sites from config, templates, and Markdown"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "jinja2>=3.1",
    "mistune>=3.0",
    "typer>=0.12",
    "rich>=13.0",
    "watchfiles>=0.21",
]

[project.scripts]
ass = "ass.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["ass"]

[dependency-groups]
dev = [
    "pytest>=8.0",
]
