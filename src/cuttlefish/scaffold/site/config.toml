title = "My Cuttlefish Site"
base_url = "https://example.com"

[home]
template = "home.html"
# Recent-items sections: content-type = count. The template reads each as
# `recent.<type>` (e.g. recent.blog), so add/remove types freely.
recent = { blog = 5, project = 3 }
# Render the [profile] block on the landing page (see below).
profile = true

# Taxonomy term lists on the home page. The template reads each as
# `taxonomies.<name>` — a list of terms with `name`, `count`, `url` (all terms
# are passed; slice in the template if you want fewer). sort_by is "count"
# (default) or "name"; order is "desc" (default) or "asc".
[home.taxonomies.tags]
sort_by = "count"
order = "desc"

# Site author/owner details, exposed to every template as `site.profile`
# (name, bio, avatar, email, socials). `socials` maps a platform key to its
# URL and keeps this order. Set `[home] profile = true` to show it on the home
# page. Avatar is a path under static/.
[profile]
name = "Your Name"
bio = "A short bio. Static-site enthusiast writing about things I build."
avatar = "/img/avatar.svg"
email = "you@example.com"
socials = { github = "https://github.com/you", mastodon = "https://mastodon.social/@you" }

# Navigation bar. `labels` and `links` are paired by position and must be the
# same length. Set `enabled = false` to hide the nav without deleting entries.
[nav]
enabled = true
labels = ["Blog", "Projects", "Tags", "About"]
links  = ["/blog/", "/projects/", "/tags/", "/about/"]

[content_types.blog]
template = "blog.html"
index_template = "blog.index.html"
permalink = "/blog/{slug}/"
index_permalink = "/blog/"
paginate = 10
sort_by = "date"
order = "desc"

[content_types.project]
template = "project.html"
index_template = "project.index.html"
permalink = "/projects/{slug}/"
index_permalink = "/projects/"
sort_by = "title"
order = "asc"

# Standalone pages: no index, no taxonomy. Do NOT add index_template here.
[content_types.pages]
template = "page.html"
permalink = "/{slug}/"

[taxonomies.tags]
template = "taxonomy.html"
index_template = "taxonomy.index.html"
permalink = "/tags/{term}/"
index_permalink = "/tags/"
# multiple = true  (default) expects a list in front matter: tags = ["a", "b"].
# Set multiple = false for single-term taxonomies, e.g. category = "AI".
