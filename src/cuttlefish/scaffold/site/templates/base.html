<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ site.title }}{% endblock %}</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <header class="site-header">
    <a class="site-title" href="/">{{ site.title }}</a>
    {% if site.nav.enabled %}
    {# CSS-only burger: the hidden checkbox toggles the nav on small screens. #}
    <input type="checkbox" id="nav-toggle" class="nav-toggle" aria-label="Toggle navigation menu">
    <label for="nav-toggle" class="nav-burger" aria-hidden="true"><span></span><span></span><span></span></label>
    <nav>
      {% for item in site.nav.items %}
      <a href="{{ item.link }}">{{ item.label }}</a>
      {% endfor %}
    </nav>
    {% endif %}
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    <p>Built with <a href="https://example.com">cuttlefish</a>.</p>
  </footer>
</body>
</html>
