{% extends "base.html" %}

{% block title %}{{ taxonomy }} — {{ site.title }}{% endblock %}

{% block content %}
  <h1>{{ taxonomy }}</h1>
  <ul class="term-list">
    {% for term in terms %}
    <li><a href="{{ term.url }}">{{ term.name }}</a> ({{ term.count }})</li>
    {% endfor %}
  </ul>
{% endblock %}
